apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: example-approval-pr
spec:
  pipelineSpec:
    tasks:
      - name: before
        taskSpec:
          steps:
            - image: busybox
              name: before
              script: echo before wait
      - name: wait
        taskRef:
          apiVersion: openshift-pipelines.org/v1alpha1
          kind: ApprovalTask
        params:
          - name: approvers
            value:
              - alice              # individual user 1
              - bob                # individual user 2
              - group:dev-team     # group with 3 members (e.g., carol, dave, erin)
          - name: numberOfApprovalsRequired
            value: "2"
          - name: description
            value: "Simple PR using ApprovalTask with 2 users and 1 group"
        runAfter: ["before"]
      - name: after
        taskSpec:
          steps:
            - image: busybox
              name: after
              script: echo after wait
        runAfter: ["wait"]

# Notes:
# - Ensure your cluster group "dev-team" contains exactly three members (e.g., carol, dave, erin).
# - The controller/webhook will attribute approvals to individual users; group members approving will be counted uniquely.


